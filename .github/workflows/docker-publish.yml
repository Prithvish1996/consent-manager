name: Build and Push Consent Manager Image

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build image
        run: |
          docker build \
            -f docker/app/Dockerfile \
            -t ghcr.io/prithvish1996/consent-manager:latest \
            -t ghcr.io/prithvish1996/consent-manager:${{ github.sha }} \
            .

      - name: Push image
        run: |
          docker push ghcr.io/prithvish1996/consent-manager:latest
          docker push ghcr.io/prithvish1996/consent-manager:${{ github.sha }}
